<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAMSBPM Technologies Inc. — Smart software for small businesses</title>
<meta name="description" content="SAMSBPM Technologies Inc. builds automation-first software for small businesses — AutoOrderSync, Vedoryx APIs, eCommerce storefronts and more. Made in Canada." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --accent-h: 25;
  --accent: oklch(0.74 0.17 var(--accent-h));
  --accent-soft: oklch(0.74 0.17 var(--accent-h) / 0.14);
  --accent-strong: oklch(0.66 0.19 var(--accent-h));
  --accent-ink: oklch(0.2 0.05 var(--accent-h));

  /* dark by default */
  --bg: oklch(0.16 0.012 60);
  --bg-elev: oklch(0.2 0.014 60);
  --bg-elev-2: oklch(0.24 0.016 60);
  --line: oklch(1 0 0 / 0.08);
  --line-strong: oklch(1 0 0 / 0.14);
  --ink: oklch(0.97 0.004 60);
  --ink-dim: oklch(0.78 0.008 60);
  --ink-mute: oklch(0.6 0.008 60);
  --shadow-lg: 0 24px 60px -20px oklch(0 0 0 / 0.5), 0 8px 20px -8px oklch(0 0 0 / 0.4);
  --shadow-sm: 0 2px 8px -2px oklch(0 0 0 / 0.4);
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 28px;
  --radius-xl: 40px;

  color-scheme: dark;
}

html[data-theme="light"] {
  --bg: oklch(0.985 0.004 80);
  --bg-elev: oklch(1 0 0);
  --bg-elev-2: oklch(0.97 0.006 80);
  --line: oklch(0.2 0.02 60 / 0.09);
  --line-strong: oklch(0.2 0.02 60 / 0.16);
  --ink: oklch(0.22 0.02 60);
  --ink-dim: oklch(0.42 0.014 60);
  --ink-mute: oklch(0.55 0.01 60);
  --shadow-lg: 0 30px 60px -30px oklch(0.2 0.03 40 / 0.22), 0 10px 24px -12px oklch(0.2 0.03 40 / 0.12);
  --shadow-sm: 0 2px 8px -3px oklch(0.2 0.03 40 / 0.12);
  color-scheme: light;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "ss01"; }

.container {
  width: 100%;
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 28px;
}

/* ===== NAV ===== */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 40;
  padding: 14px 0;
  transition: background .3s, backdrop-filter .3s, border-color .3s;
}
.nav-wrap.scrolled {
  background: color-mix(in oklch, var(--bg) 75%, transparent);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  letter-spacing: -0.01em;
  font-size: 17px;
}
.logo-mark {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: linear-gradient(140deg, var(--accent) 0%, oklch(0.65 0.22 calc(var(--accent-h) - 30)) 100%);
  display: grid; place-items: center;
  color: white;
  font-weight: 800;
  box-shadow: 0 6px 18px -6px var(--accent);
  font-size: 14px;
  position: relative;
  overflow: hidden;
}
.logo-mark::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(120% 80% at 20% 0%, oklch(1 0 0 / 0.35), transparent 60%);
}
.nav-links {
  display: flex; gap: 4px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 6px;
  border-radius: 999px;
}
.nav-links a {
  padding: 8px 16px;
  font-size: 14px;
  color: var(--ink-dim);
  border-radius: 999px;
  transition: color .2s, background .2s;
  font-weight: 500;
}
.nav-links a:hover { color: var(--ink); background: var(--bg-elev-2); }
.nav-cta { display: flex; align-items: center; gap: 10px; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.005em;
  transition: transform .15s, box-shadow .2s, background .2s, color .2s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  box-shadow: 0 8px 28px -10px var(--accent), inset 0 1px 0 oklch(1 0 0 / 0.35);
}
.btn-primary:hover {
  background: var(--accent-strong);
  box-shadow: 0 12px 36px -10px var(--accent);
}
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line-strong);
}
.btn-ghost:hover { background: var(--bg-elev); }
.btn-sm { padding: 8px 14px; font-size: 13px; }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 999px;
  display: grid; place-items: center;
  border: 1px solid var(--line);
  color: var(--ink-dim);
  transition: color .2s, background .2s, border-color .2s;
}
.icon-btn:hover { color: var(--ink); border-color: var(--line-strong); background: var(--bg-elev); }

/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 60px 0 100px;
  overflow: hidden;
  isolation: isolate;
}
.hero-mesh {
  position: absolute;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(60% 50% at 50% 0%, oklch(0.72 0.18 var(--accent-h) / 0.18), transparent 70%);
}
html[data-theme="light"] .hero-mesh {
  background:
    radial-gradient(60% 50% at 50% 0%, oklch(0.72 0.18 var(--accent-h) / 0.12), transparent 70%);
}
.hero-mesh .blob { display: none; }

.hero-grid {
  position: absolute; inset: 0; z-index: -1;
  pointer-events: none;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 75%);
  opacity: 0.6;
}

.hero-grain { display: none; }

.hero-inner {
  text-align: center;
  max-width: 880px;
  margin: 0 auto;
}

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px 6px 8px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-dim);
  margin-bottom: 28px;
}
.eyebrow-dot {
  width: 20px; height: 20px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 11px;
}
.eyebrow-dot::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px var(--accent-soft); } 50% { box-shadow: 0 0 0 8px transparent; } }

h1.hero-title {
  font-size: clamp(40px, 6.5vw, 80px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  font-weight: 700;
  margin: 0 0 22px;
  text-wrap: balance;
}
h1.hero-title .accent-word {
  background: linear-gradient(100deg, oklch(0.72 0.17 50) 0%, oklch(0.78 0.16 70) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: italic;
}
.hero-sub {
  font-size: clamp(16px, 1.5vw, 19px);
  color: var(--ink-dim);
  max-width: 620px;
  margin: 0 auto 36px;
  text-wrap: pretty;
}
.hero-actions {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 56px;
}

/* floating preview card */
.hero-preview {
  margin: 0 auto;
  max-width: 1080px;
  position: relative;
}
.hero-preview-card {
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
  padding: 14px;
  transform: perspective(1400px) rotateX(6deg);
  transform-origin: center top;
}

/* ===== SECTION BASICS ===== */
section { scroll-margin-top: 80px; }

.section {
  padding: 110px 0;
  position: relative;
}
.section-head {
  text-align: center;
  max-width: 680px;
  margin: 0 auto 56px;
}
.section-eyebrow {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
h2.section-title {
  font-size: clamp(32px, 4.4vw, 52px);
  line-height: 1.05;
  letter-spacing: -0.03em;
  font-weight: 700;
  margin: 0 0 16px;
  text-wrap: balance;
}
.section-sub {
  font-size: 17px;
  color: var(--ink-dim);
  margin: 0;
  text-wrap: pretty;
}

/* ===== ABOUT ===== */
.about {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 900px) { .about { grid-template-columns: 1fr; gap: 40px; } }

.about-bullets {
  list-style: none;
  margin: 24px 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.about-bullets li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  color: var(--ink-dim);
}
.about-check-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
}

.about-visual {
  position: relative;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 2px solid var(--accent);
  overflow: hidden;
  padding: 24px;
}
.about-visual-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--bg-surface);
  border: 1px solid var(--line);
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  color: var(--ink);
}
.about-prod-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.about-prod-tile {
  background: var(--bg-elev-2);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.about-prod-tile-icon {
  font-size: 22px;
  line-height: 1;
  margin-bottom: 4px;
}
.about-prod-tile-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.about-prod-tile-sub {
  font-size: 12px;
  color: var(--ink-mute);
}
.about-visual-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
}
.about-active-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 999px;
  background: var(--bg-surface);
  border: 1px solid var(--line);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  color: var(--ink-dim);
}
.about-active-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #22c55e;
  flex-shrink: 0;
}

/* ===== PRODUCTS ===== */
.products-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 1000px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .products-grid { grid-template-columns: 1fr; } }

.product-card {
  position: relative;
  padding: 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: transform .25s, border-color .25s, background .25s;
  overflow: hidden;
  min-height: 260px;
}
.product-card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(140deg, var(--accent) 0%, transparent 45%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
}
.product-card:hover { transform: translateY(-4px); }
.product-card:hover::before { opacity: 1; }
.product-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: grid; place-items: center;
  background: var(--accent-soft);
  color: var(--accent);
  flex-shrink: 0;
}
.product-icon svg { width: 24px; height: 24px; }
.product-title { font-size: 19px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
.product-desc { font-size: 14px; color: var(--ink-dim); margin: 0; line-height: 1.55; }
.product-more {
  margin-top: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  transition: gap .2s;
}
.product-card:hover .product-more { gap: 10px; }
.product-tag {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg);
  font-weight: 600;
}

/* Illustrated card variant */
.product-card.illustrated {
  padding: 0;
  min-height: 320px;
}
.product-card.illustrated .product-illust {
  height: 140px;
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  background: linear-gradient(135deg, var(--accent-soft), transparent);
  border-bottom: 1px solid var(--line);
}
.product-card.illustrated .product-body {
  padding: 22px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.product-card.illustrated .product-icon {
  position: absolute;
  left: 20px; bottom: -20px;
  box-shadow: 0 8px 20px -10px oklch(0 0 0 / 0.4);
  background: var(--accent);
  color: var(--accent-ink);
}
.product-card.illustrated .product-body .product-title { margin-top: 16px; }

/* ===== HOW IT WORKS ===== */
.how {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 900px) { .how { grid-template-columns: 1fr; } }
.how-steps { display: flex; flex-direction: column; gap: 8px; }
.how-step {
  padding: 20px 22px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 16px;
  cursor: pointer;
  transition: background .25s, border-color .25s;
}
.how-step:hover { background: var(--bg-elev); }
.how-step.active { background: var(--bg-elev); border-color: var(--line-strong); }
.how-step-num {
  width: 36px; height: 36px;
  border-radius: 12px;
  display: grid; place-items: center;
  background: var(--bg-elev-2);
  color: var(--ink-dim);
  font-weight: 700;
  font-size: 14px;
  transition: background .25s, color .25s;
}
.how-step.active .how-step-num { background: var(--accent); color: var(--accent-ink); }
.how-step-title { font-weight: 700; font-size: 16px; margin: 0 0 4px; letter-spacing: -0.01em; }
.how-step-desc { font-size: 14px; color: var(--ink-dim); margin: 0; }

.how-stage {
  aspect-ratio: 1/1;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.how-stage::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(80% 60% at 50% 0%, var(--accent-soft), transparent 60%);
  pointer-events: none;
}

/* ===== FEATURES ===== */
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 900px) { .features-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .features-grid { grid-template-columns: 1fr; } }
.feature {
  padding: 28px;
  border-radius: var(--radius);
  background: var(--bg-elev);
  border: 1px solid var(--line);
}
.feature-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--bg-elev-2);
  color: var(--accent);
  display: grid; place-items: center;
  margin-bottom: 18px;
}
.feature h3 { margin: 0 0 6px; font-size: 16px; letter-spacing: -0.01em; }
.feature p { margin: 0; font-size: 14px; color: var(--ink-dim); }

/* ===== INDUSTRIES ===== */
.ind-tabs {
  display: flex;
  gap: 6px;
  padding: 6px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  width: max-content;
  margin: 0 auto 40px;
  flex-wrap: wrap;
  justify-content: center;
}
.ind-tab {
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-dim);
  transition: background .2s, color .2s;
}
.ind-tab:hover { color: var(--ink); }
.ind-tab.active {
  background: var(--accent);
  color: var(--accent-ink);
}
.ind-content {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  padding: 40px;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  align-items: center;
}
@media (max-width: 900px) { .ind-content { grid-template-columns: 1fr; } }
.ind-content h3 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 12px; }
.ind-content p { color: var(--ink-dim); margin: 0 0 24px; }
.ind-products { display: flex; flex-wrap: wrap; gap: 8px; }
.ind-product-chip {
  font-size: 12px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid transparent;
}
.ind-illustration {
  aspect-ratio: 1;
  border-radius: var(--radius);
  background:
    repeating-linear-gradient(45deg, var(--line) 0 1px, transparent 1px 14px),
    var(--bg-elev-2);
  display: grid;
  place-items: center;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  position: relative;
  overflow: hidden;
}
.ind-illustration .ind-emoji {
  font-size: 64px;
  filter: saturate(0.8);
}

/* ===== CTA STRIP ===== */
.cta-strip {
  margin: 0 auto;
  padding: 64px 56px;
  border-radius: var(--radius-xl);
  background:
    radial-gradient(100% 80% at 10% 0%, oklch(0.72 0.18 45) 0%, transparent 60%),
    radial-gradient(100% 80% at 100% 100%, oklch(0.6 0.18 35) 0%, transparent 60%),
    var(--bg-elev-2);
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  text-align: center;
}
.cta-strip h2 {
  font-size: clamp(30px, 3.8vw, 44px);
  letter-spacing: -0.025em;
  margin: 0 0 12px;
  color: white;
}
.cta-strip p {
  color: oklch(1 0 0 / 0.8);
  margin: 0 0 24px;
  font-size: 17px;
}
html[data-theme="light"] .cta-strip h2 { color: oklch(0.22 0.02 60); }
html[data-theme="light"] .cta-strip p { color: oklch(0.22 0.02 60 / 0.75); }

/* ===== PRODUCT MODAL ===== */
.prod-modal-overlay {
  position: fixed; inset: 0; z-index: 60;
  background: oklch(0 0 0 / 0.6);
  backdrop-filter: blur(10px);
  display: grid; place-items: center;
  padding: 20px;
  animation: fadeIn .2s;
}
.prod-modal {
  max-width: 640px; width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--line-strong);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  animation: popUp .3s cubic-bezier(.2,1,.3,1);
  max-height: 90vh;
  overflow-y: auto;
  overflow-x: hidden;
}
.prod-modal-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 28px 28px 0;
  gap: 16px;
}
.prod-modal-meta {
  display: flex; align-items: center; gap: 14px;
}
.prod-modal-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.prod-modal-body { padding: 20px 28px 28px; }
.prod-modal-tagline {
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 10px;
  line-height: 1.3;
}
.prod-modal-desc {
  font-size: 15px; color: var(--ink-dim);
  line-height: 1.65; margin: 0 0 24px;
}

/* Flow diagram */
.flow-diagram {
  background: var(--bg-elev-2);
  border-radius: 16px;
  border: 1px solid var(--line);
  padding: 20px;
  margin-bottom: 24px;
  overflow-x: auto;
}
.flow-diagram-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ink-mute); margin-bottom: 16px;
}
.flow-steps {
  display: flex; align-items: center;
  gap: 0; flex-wrap: nowrap;
  min-width: max-content;
}
.flow-step {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  min-width: 90px;
}
.flow-step-bubble {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent-soft);
  border: 2px solid var(--accent);
  display: grid; place-items: center;
  font-size: 18px;
  color: var(--accent);
  flex-shrink: 0;
}
.flow-step-label {
  font-size: 11px; font-weight: 600;
  color: var(--ink-dim);
  text-align: center; max-width: 80px;
  line-height: 1.3;
}
.flow-arrow {
  color: var(--accent); opacity: 0.6;
  flex-shrink: 0; margin: 0 2px;
  align-self: flex-start; margin-top: 12px;
}

/* Features list */
.prod-modal-features {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 24px;
}
@media (max-width: 480px) { .prod-modal-features { grid-template-columns: 1fr; } }
.prod-modal-feature {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px;
  background: var(--bg-elev-2);
  border-radius: 12px;
  border: 1px solid var(--line);
  font-size: 13px; color: var(--ink-dim);
  line-height: 1.4;
}
.prod-modal-feature-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0; margin-top: 4px;
}
.prod-modal-footer {
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap;
}

/* Legal modal */
.legal-modal-overlay {
  position: fixed; inset: 0; z-index: 70;
  background: oklch(0 0 0 / 0.6);
  backdrop-filter: blur(10px);
  display: grid; place-items: center;
  padding: 20px;
  animation: fadeIn .2s;
}
.legal-modal {
  max-width: 680px; width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--line-strong);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  animation: popUp .3s cubic-bezier(.2,1,.3,1);
  max-height: 85vh;
  display: flex; flex-direction: column;
}
.legal-modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.legal-modal-head h2 { margin: 0; font-size: 20px; letter-spacing: -0.02em; }
.legal-modal-scroll {
  overflow-y: auto; padding: 24px 28px;
  font-size: 14px; line-height: 1.75;
  color: var(--ink-dim);
}
.legal-modal-scroll h3 {
  font-size: 15px; font-weight: 700;
  color: var(--ink); margin: 22px 0 6px;
}
.legal-modal-scroll h3:first-child { margin-top: 0; }
.legal-modal-scroll p { margin: 0 0 10px; }
.legal-modal-scroll ul { margin: 6px 0 10px; padding-left: 20px; }
.legal-modal-scroll li { margin-bottom: 4px; }
.legal-effective { font-size: 12px; color: var(--ink-mute); margin-top: 20px; border-top: 1px solid var(--line); padding-top: 14px; }

/* ===== CONTACT ===== */
.contact {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 48px;
  padding: 48px;
  border-radius: var(--radius-lg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
}
@media (max-width: 900px) { .contact { grid-template-columns: 1fr; padding: 32px; } }
.contact-info h3 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 12px; }
.contact-info p { color: var(--ink-dim); margin: 0 0 28px; }
.contact-detail {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-top: 1px solid var(--line);
  font-size: 14px;
}
.contact-detail:last-child { border-bottom: 1px solid var(--line); }
.contact-detail-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-elev-2);
  color: var(--accent);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.contact-detail-label { color: var(--ink-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.contact-detail-value { color: var(--ink); font-weight: 500; }

.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-row label { font-size: 12px; font-weight: 600; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.04em; }
.form-row input, .form-row textarea {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--ink);
  font-family: inherit;
  font-size: 15px;
  transition: border-color .2s, background .2s;
}
.form-row input:focus, .form-row textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-elev-2);
}
.form-row textarea { resize: vertical; min-height: 120px; }
.form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row.row-2 > div { display: flex; flex-direction: column; gap: 6px; }
.form-success {
  padding: 14px 16px;
  border-radius: 12px;
  background: oklch(0.7 0.16 150 / 0.14);
  color: oklch(0.75 0.15 150);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid oklch(0.7 0.16 150 / 0.3);
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ===== FOOTER ===== */
footer {
  padding: 80px 0 40px;
  border-top: 1px solid var(--line);
  margin-top: 40px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr 1fr;
  gap: 48px;
  margin-bottom: 60px;
}
@media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
.footer-col h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute); margin: 0 0 18px; font-weight: 600; }
.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer-col a { color: var(--ink-dim); font-size: 14px; transition: color .2s; }
.footer-col a:hover { color: var(--ink); }
.footer-brand-desc { color: var(--ink-dim); font-size: 14px; max-width: 280px; margin: 16px 0 0; line-height: 1.6; }
.footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink-mute);
  flex-wrap: wrap;
  gap: 12px;
}
.footer-socials { display: flex; gap: 8px; }

/* ===== MOBILE NAV ===== */
@media (max-width: 820px) {
  .nav-links { display: none; }
}

/* ===== SCROLL REVEAL ===== */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s, transform .7s; }
.reveal.in { opacity: 1; transform: translateY(0); }
</style>

<!-- tweaks-panel -->
<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;height:22px;
    border-radius:6px;cursor:default;padding:0}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };

  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value); valueRef.current = value;
  const segAt = (clientX) => { const r = trackRef.current.getBoundingClientRect(); const inner = r.width - 4; const i = Math.floor(((clientX - r.left - 2) / inner) * n); return opts[Math.max(0, Math.min(n - 1, i))].value; };
  const onPointerDown = (e) => {
    setDragging(true); const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio });
</script>

<script type="text/babel">
const { useState: useStateH, useEffect: useEffectH, useRef: useRefH } = React;

function HowItWorks() {
  const { STEPS } = window.SAMSBPM_DATA;
  const [step, setStep] = useStateH(0);
  const [paused, setPaused] = useStateH(false);

  useEffectH(() => {
    if (paused) return;
    const t = setTimeout(() => setStep((s) => (s + 1) % STEPS.length), 3800);
    return () => clearTimeout(t);
  }, [step, paused]);

  return (
    <section className="section" id="how">
      <div className="container">
        <div className="section-head">
          <div className="section-eyebrow">How it works</div>
          <h2 className="section-title">A WhatsApp message becomes a confirmed order, automatically.</h2>
          <p className="section-sub">Watch a real order flow through the platform — from a customer's chat to your daily report.</p>
        </div>
        <div className="how">
          <div className="how-steps" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
            {STEPS.map((s, i) => (
              <div key={i} className={`how-step ${i === step ? "active" : ""}`} onClick={() => setStep(i)}>
                <div className="how-step-num">{String(i + 1).padStart(2, "0")}</div>
                <div>
                  <h3 className="how-step-title">{s.title}</h3>
                  <p className="how-step-desc">{s.desc}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="how-stage">
            <FlowStage step={step} />
          </div>
        </div>
      </div>
    </section>
  );
}

function FlowStage({ step }) {
  return (
    <div style={{ position: "relative", width: "100%", height: "100%" }}>
      {[0, 1, 2, 3].map((i) => (
        <div key={i} style={{ position: "absolute", inset: 0, opacity: step === i ? 1 : 0, transform: step === i ? "translateY(0)" : "translateY(16px)", transition: "opacity .5s, transform .5s", pointerEvents: step === i ? "auto" : "none" }}>
          {i === 0 && <PhoneMsg />}
          {i === 1 && <ProcessingVisual />}
          {i === 2 && <MiniDashboard />}
          {i === 3 && <ReportVisual />}
        </div>
      ))}
    </div>
  );
}

function PhoneMsg() {
  return (
    <div style={{ width: "100%", height: "100%", display: "grid", placeItems: "center" }}>
      <div style={{ width: 280, background: "var(--bg-elev-2)", borderRadius: 28, border: "1px solid var(--line)", padding: 16, boxShadow: "var(--shadow-sm)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, paddingBottom: 14, borderBottom: "1px solid var(--line)" }}>
          <div style={{ width: 36, height: 36, borderRadius: 999, background: "oklch(0.7 0.15 150)", display: "grid", placeItems: "center", color: "white" }}><IconWhatsApp width="18" height="18" /></div>
          <div><div style={{ fontSize: 13, fontWeight: 700 }}>Ananya · customer</div><div style={{ fontSize: 11, color: "oklch(0.7 0.15 150)" }}>online</div></div>
        </div>
        <div style={{ padding: "16px 0", display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ alignSelf: "flex-start", background: "var(--bg)", padding: "8px 12px", borderRadius: "14px 14px 14px 4px", fontSize: 13, maxWidth: "85%", animation: "msgIn .5s .1s both" }}>Hi! Can I get 2 boxes of Alphonso mangoes for delivery Friday?</div>
          <div style={{ alignSelf: "flex-end", background: "oklch(0.7 0.15 150 / 0.2)", color: "oklch(0.75 0.15 150)", padding: "8px 12px", borderRadius: "14px 14px 4px 14px", fontSize: 13, maxWidth: "85%", animation: "msgIn .5s .9s both" }}>Of course! 2× 5kg Alphonso, $84 total. Confirm? ✅</div>
        </div>
        <style>{`@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }`}</style>
      </div>
    </div>
  );
}

function ProcessingVisual() {
  return (
    <div style={{ width: "100%", height: "100%", display: "grid", placeItems: "center", position: "relative" }}>
      <div style={{ width: 140, height: 140, borderRadius: 999, background: "var(--accent-soft)", display: "grid", placeItems: "center", animation: "pulseRing 2s infinite" }}>
        <div style={{ width: 80, height: 80, borderRadius: 24, background: "var(--accent)", color: "var(--accent-ink)", display: "grid", placeItems: "center", boxShadow: "0 10px 28px -8px var(--accent)" }}>
          <IconSparkles width="32" height="32" />
        </div>
      </div>
      {[{ t: "Parse intent", a: 0 }, { t: "Check stock", a: 90 }, { t: "Price lookup", a: 180 }, { t: "Create order", a: 270 }].map((p, i) => (
        <div key={p.t} style={{ position: "absolute", top: "50%", left: "50%", transform: `rotate(${p.a}deg) translate(120px) rotate(-${p.a}deg) translate(-50%, -50%)`, padding: "6px 12px", borderRadius: 999, background: "var(--bg-elev-2)", border: "1px solid var(--line)", fontSize: 11, fontWeight: 600, whiteSpace: "nowrap", animation: `popIn .4s ${0.3 + i * 0.15}s both` }}>{p.t}</div>
      ))}
      <style>{`@keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-soft); } 50% { box-shadow: 0 0 0 24px transparent; } } @keyframes popIn { from { opacity: 0; transform: scale(0.5) translate(-50%, -50%); } }`}</style>
    </div>
  );
}

function MiniDashboard() {
  return (
    <div style={{ width: "100%", height: "100%", padding: 4, display: "flex", alignItems: "center" }}>
      <DashboardMock highlightNew compact />
    </div>
  );
}

function ReportVisual() {
  return (
    <div style={{ width: "100%", height: "100%", display: "grid", placeItems: "center", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 360, background: "var(--bg-elev-2)", borderRadius: 16, border: "1px solid var(--line)", padding: 20 }}>
        <div style={{ fontSize: 11, color: "var(--ink-mute)", textTransform: "uppercase", letterSpacing: 0.08, fontWeight: 600 }}>Daily summary · Apr 23</div>
        <div style={{ fontSize: 18, fontWeight: 700, margin: "6px 0 14px", letterSpacing: "-0.02em" }}>You had a great day.</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {[{ l: "Total orders", v: "184", c: "var(--accent)" }, { l: "Revenue", v: "$12.4k", c: "oklch(0.7 0.15 150)" }, { l: "Avg value", v: "$67", c: "oklch(0.7 0.18 260)" }, { l: "Automated", v: "92%", c: "oklch(0.7 0.18 30)" }].map((x) => (
            <div key={x.l} style={{ background: "var(--bg)", padding: 12, borderRadius: 10, borderLeft: `3px solid ${x.c}` }}>
              <div style={{ fontSize: 10, color: "var(--ink-mute)", fontWeight: 600 }}>{x.l}</div>
              <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em" }}>{x.v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 16, padding: 12, background: "var(--accent-soft)", borderRadius: 10, fontSize: 12, color: "var(--accent)", fontWeight: 500 }}>
          💡 Alphonso mangoes are trending. Restock for the weekend.
        </div>
      </div>
    </div>

}

function Industries() {
  const { INDUSTRIES } = window.SAMSBPM_DATA;
  const [tab, setTab] = useStateH("grocery");
  const ind = INDUSTRIES.find((i) => i.id === tab);

  return (
    <section className="section" id="industries">
      <div className="container">
        <div className="section-head">
          <div className="section-eyebrow">Industries</div>
          <h2 className="section-title">Built for the businesses we see every day.</h2>
          <p className="section-sub">Pick your industry and see which products fit best.</p>
        </div>
        <div className="ind-tabs">
          {INDUSTRIES.map((i) => (
            <button key={i.id} className={`ind-tab ${tab === i.id ? "active" : ""}`} onClick={() => setTab(i.id)}>
              <span style={{ marginRight: 6 }}>{i.emoji}</span>{i.name}
            </button>
          ))}

        <div className="ind-content">
          <div>
            <h3>{ind.headline}</h3>

            <div style={{ fontSize: 12, color: "var(--ink-mute)", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.06, marginBottom: 10 }}>Recommended products</div>
            <div className="ind-products">
              {ind.products.map((p) => <div key={p} className="ind-product-chip">{p}</div>)}
            </div>
          </div>
          <div className="ind-illustration">
            <div style={{ textAlign: "center" }}>
              <div className="ind-emoji">{ind.emoji}</div>
              <div style={{ marginTop: 8 }}>{ind.name.toUpperCase()}</div>

}

function CTAStrip({ onOpenDemo }) {
  return (
    <section className="section" style={{ paddingTop: 0 }}>
      <div className="container">
        <div className="cta-strip">
          <h2>Ready to automate the boring parts?</h2>
          <p>See SAMSBPM running on your business in a 20-minute walkthrough.</p>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button className="btn btn-primary" onClick={onOpenDemo}>Request a demo <IconArrowRight width="14" height="14" /></button>
            <a href="#contact" className="btn btn-ghost" style={{ background: "oklch(1 0 0 / 0.25)", color: "oklch(0.22 0.02 60)", borderColor: "oklch(0.22 0.02 60 / 0.25)" }}>Contact sales</a>
          </div>
        </div>
      </div>
    </section>
  );
}

function Contact({ demoOpen, onCloseDemo, prefillProduct }) {
  const [form, setForm] = useStateH({ name: "", email: "", company: "", message: "" });
  const [status, setStatus] = useStateH("idle"); // idle | sending | sent | error

  // Pre-fill message when a product name is passed from the product modal
  useEffectH(() => {
    if (prefillProduct) {
      setForm((f) => ({ ...f, message: `Hi, I'm interested in learning more about ${prefillProduct}. ` }));
    }
  }, [prefillProduct]);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.name || !form.email || !form.message) return;
    setStatus("sending");
    try {
      const res = await fetch("https://formsubmit.co/ajax/contact@samsbpm.ca", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          name: form.name,
          email: form.email,
          company: form.company || "(not provided)",
          message: form.message,
          _subject: `New message from ${form.name} via samsbpm.ca`,
        }),
      });
      if (res.ok) {
        setStatus("sent");
        setForm({ name: "", email: "", company: "", message: "" });
        setTimeout(() => setStatus("idle"), 5000);
      } else {
        setStatus("error");
      }
    } catch {
      setStatus("error");
    }
  };

  return (
    <section className="section" id="contact">
      <div className="container">
        <div className="section-head">
          <div className="section-eyebrow">Contact</div>
          <h2 className="section-title">Let's build something together.</h2>
          <p className="section-sub">Questions, demo requests, partnership ideas — we reply in one business day.</p>
        </div>
        <div className="contact">
          <div className="contact-info">
            <h3>Say hello</h3>
            <p>Based in Canada, working with businesses across North America. Reach out however works best for you.</p>
            <div className="contact-detail">
              <div className="contact-detail-icon"><IconMail width="16" height="16" /></div>
              <div><div className="contact-detail-label">Email</div><div className="contact-detail-value">contact@samsbpm.ca</div></div>
            </div>
            <div className="contact-detail">
              <div className="contact-detail-icon"><IconPin width="16" height="16" /></div>
              <div><div className="contact-detail-label">Location</div><div className="contact-detail-value">Whitby, Ontario · Canada</div></div>
            </div>
            <div className="contact-detail">
              <div className="contact-detail-icon"><IconPhone width="16" height="16" /></div>
              <div><div className="contact-detail-label">Phone</div><div className="contact-detail-value">+1 (647) 949-xxxx</div></div>
            </div>
          </div>
          <form onSubmit={submit}>
            <div className="form-row row-2">
              <div><label>Name</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Jane Doe" /></div>
              <div><label>Email</label><input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="jane@company.com" /></div>
            </div>
            <div className="form-row"><label>Company (optional)</label><input value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })} placeholder="Your business" /></div>
            <div className="form-row"><label>What can we help with?</label><textarea value={form.message} onChange={(e) => setForm({ ...form, message: e.target.value })} placeholder="Tell us about your business and what you're trying to automate…" /></div>
            {status === "sent" ? (
              <div className="form-success"><IconCheck width="16" height="16" /> Thanks — we'll be in touch within one business day.</div>
            ) : status === "error" ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div className="form-success" style={{ background: "rgba(239,68,68,0.08)", borderColor: "rgba(239,68,68,0.3)", color: "#ef4444" }}>
                  <IconX width="16" height="16" /> Something went wrong — please email us directly at contact@samsbpm.ca
                </div>
                <button className="btn btn-primary" type="submit" onClick={() => setStatus("idle")}>Try again <IconArrowRight width="14" height="14" /></button>
              </div>
            ) : (
              <button className="btn btn-primary" type="submit" disabled={status === "sending"}>
                {status === "sending" ? "Sending…" : <span>Send message <IconArrowRight width="14" height="14" /></span>}
              </button>
            )}
          </form>
        </div>
      </div>
      {demoOpen && <DemoModal onClose={onCloseDemo} />}
    </section>
  );
}

function DemoModal({ onClose }) {
  const [step, setStep] = useStateH(0);
  const [data, setData] = useStateH({ name: "", email: "", business: "", when: "" });
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, background: "oklch(0 0 0 / 0.55)", backdropFilter: "blur(8px)", display: "grid", placeItems: "center", padding: 20, animation: "fadeIn .25s" }} onClick={onClose}>
      <div style={{ maxWidth: 460, width: "100%", background: "var(--bg-elev)", border: "1px solid var(--line)", borderRadius: 24, padding: 28, boxShadow: "var(--shadow-lg)", animation: "popUp .3s cubic-bezier(.2,1,.3,1)" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 12, color: "var(--ink-mute)", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.06 }}>Step {step + 1} of 3</div>
          <button className="icon-btn" onClick={onClose}><IconX width="14" height="14" /></button>
        </div>
        {step === 0 && (
          <>
            <h3 style={{ margin: "0 0 4px", fontSize: 24, letterSpacing: "-0.02em" }}>Let's meet.</h3>
            <p style={{ margin: "0 0 20px", color: "var(--ink-dim)" }}>A 20-minute walkthrough, no slides.</p>
            <div className="form-row"><label>Your name</label><input value={data.name} onChange={(e) => setData({ ...data, name: e.target.value })} autoFocus /></div>
            <div className="form-row"><label>Email</label><input value={data.email} onChange={(e) => setData({ ...data, email: e.target.value })} /></div>
            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={() => setStep(1)} disabled={!data.name || !data.email}>Next <IconArrowRight width="14" height="14" /></button>
          </>
        )}
        {step === 1 && (
          <>
            <h3 style={{ margin: "0 0 4px", fontSize: 24, letterSpacing: "-0.02em" }}>What do you run?</h3>
            <p style={{ margin: "0 0 20px", color: "var(--ink-dim)" }}>Helps us tailor the demo.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
              {["Grocery", "Rental", "Retail", "Temple/Non-profit", "Portfolio", "Other"].map((b) => (
                <button key={b} type="button" className="btn btn-ghost" style={{ justifyContent: "center", borderColor: data.business === b ? "var(--accent)" : "var(--line-strong)", color: data.business === b ? "var(--accent)" : "var(--ink)", background: data.business === b ? "var(--accent-soft)" : "transparent" }} onClick={() => setData({ ...data, business: b })}>{b}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-ghost" onClick={() => setStep(0)}>Back</button>
              <button className="btn btn-primary" style={{ flex: 1, justifyContent: "center" }} onClick={() => setStep(2)} disabled={!data.business}>Next <IconArrowRight width="14" height="14" /></button>
            </div>
          </>
        )}
        {step === 2 && (
          <div style={{ textAlign: "center", padding: "20px 0" }}>
            <div style={{ width: 56, height: 56, borderRadius: 999, background: "var(--accent-soft)", color: "var(--accent)", display: "grid", placeItems: "center", margin: "0 auto 16px" }}><IconCheck width="28" height="28" /></div>
            <h3 style={{ margin: "0 0 8px", fontSize: 24, letterSpacing: "-0.02em" }}>Request received.</h3>
            <p style={{ margin: "0 0 20px", color: "var(--ink-dim)" }}>We'll send {data.email} three time slots in the next business day.</p>
            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={onClose}>Close</button>
          </div>
        )}
      </div>
      <style>{`@keyframes fadeIn { from { opacity: 0; } } @keyframes popUp { from { opacity: 0; transform: translateY(12px) scale(0.98); } }`}</style>
    </div>
  );
}

Object.assign(window, { HowItWorks, Industries, CTAStrip, Contact });
</script>

<!-- app -->
<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp } = React;

const TWEAK_DEFAULTS = { "theme": "light", "accentHue": 25, "cardStyle": "clean" };

const ACCENTS = [
  { v: 25, name: "Sunrise" },
  { v: 150, name: "Mint" },
  { v: 260, name: "Iris" },
  { v: 340, name: "Coral" },
  { v: 80, name: "Citron" },
  { v: 210, name: "Arctic" },
];

function App() {
  const [values, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [demoOpen, setDemoOpen] = useStateApp(false);
  const [privacyOpen, setPrivacyOpen] = useStateApp(false);
  const [termsOpen, setTermsOpen] = useStateApp(false);
  const [prefillProduct, setPrefillProduct] = useStateApp(null);

  useEffectApp(() => {
    document.documentElement.setAttribute("data-theme", values.theme);
  }, [values.theme]);

  useEffectApp(() => {
    document.documentElement.style.setProperty("--accent-h", values.accentHue);
  }, [values.accentHue]);

  const toggleTheme = () => setTweak("theme", values.theme === "dark" ? "light" : "dark");

  const handleProductContact = (productName) => {
    setPrefillProduct(productName);
    document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
  };

  return (
    <>
      <Navbar onOpenDemo={() => setDemoOpen(true)} onThemeToggle={toggleTheme} theme={values.theme} />
      <Hero onOpenDemo={() => setDemoOpen(true)} />
      <Products cardStyle={values.cardStyle} onProductContact={handleProductContact} />
      <HowItWorks />
      <About />
      <Features />
      <Industries />
      <CTAStrip onOpenDemo={() => setDemoOpen(true)} />
      <Contact demoOpen={demoOpen} onCloseDemo={() => setDemoOpen(false)} prefillProduct={prefillProduct} />
      <Footer onPrivacy={() => setPrivacyOpen(true)} onTerms={() => setTermsOpen(true)} />
      {privacyOpen && <PrivacyModal onClose={() => setPrivacyOpen(false)} />}
      {termsOpen && <TermsModal onClose={() => setTermsOpen(false)} />}

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Theme" />
        <window.TweakRadio label="Mode" value={values.theme} options={["dark", "light"]} onChange={(v) => setTweak("theme", v)} />
        <window.TweakSection label="Accent color" />
        <div style={{ padding: "6px 0 10px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 6 }}>
            {ACCENTS.map((a) => (
              <button key={a.v} title={a.name} onClick={() => setTweak("accentHue", a.v)} style={{ aspectRatio: "1", borderRadius: 10, border: "none", outline: values.accentHue === a.v ? "2px solid white" : "1px solid rgba(255,255,255,0.15)", outlineOffset: values.accentHue === a.v ? "2px" : "0", background: `oklch(0.72 0.18 ${a.v})`, cursor: "pointer" }} />
            ))}
          </div>
        </div>
        <window.TweakSection label="Product cards" />
        <window.TweakRadio label="Style" value={values.cardStyle} options={["clean", "illustrated"]} onChange={(v) => setTweak("cardStyle", v)} />
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
